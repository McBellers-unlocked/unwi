# AWS Amplify build + deploy config.
#
# The nightly snapshot cron now runs in the classifier Lambda (EventBridge
# rule defined in infra/template.yaml). Amplify only builds and serves the
# Next.js reader app.

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --legacy-peer-deps
    build:
      commands:
        # Amplify Gen 1 exposes env vars to the BUILD shell but not reliably
        # to the Next.js SSR Lambda. Bake them into .env.production so
        # server-side code picks them up at build time. Only whitelist the
        # vars we actually need.
        - env | grep -E "^(COGNITO_|DATABASE_URL)=" > .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

env:
  variables:
    NEXT_TELEMETRY_DISABLED: "1"

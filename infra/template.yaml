AWSTemplateFormatVersion: "2010-09-09"
Description: >
  UN Workforce Intelligence (UNWI) — v0.1 durable infrastructure.
  Cognito user pool + Aurora Serverless v2 Postgres + Secrets Manager.
  Amplify hosting and DNS are wired up separately (Amplify requires a
  GitHub OAuth connection that can't be automated cleanly; DNS is at
  Cloudflare).

Parameters:
  ProjectName:
    Type: String
    Default: unwi
    Description: Short name used as a prefix on every resource.

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to place Aurora in (typically the default VPC).

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least two subnets in different AZs for the Aurora DB subnet group.

  DBInstanceClass:
    Type: String
    Default: db.serverless
    Description: Keep this at db.serverless for Aurora Serverless v2.

  DBMinCapacity:
    Type: Number
    Default: 0.5
    MinValue: 0.5
    Description: Minimum ACU. 0.5 is the cheapest; raise to reduce cold-start latency.

  DBMaxCapacity:
    Type: Number
    Default: 2
    Description: Maximum ACU. Scale up if the dashboard starts paging or the
                 cron snapshot runs long.

  CognitoDomainPrefix:
    Type: String
    Default: unwi-auth
    AllowedPattern: "^[a-z0-9-]{3,63}$"
    Description: Globally unique prefix for the Cognito hosted-UI domain.
                 Ends up as https://<prefix>.auth.<region>.amazoncognito.com.
                 If the default is taken, append a short suffix.

  AdminEmail:
    Type: String
    Default: ""
    Description: Optional. If set, a Cognito admin user is pre-created with
                 this email and a temporary password that you retrieve from
                 the stack outputs.

  ClassifierImageUri:
    Type: String
    Default: ""
    Description: ECR image URI for the Python classifier Lambda. Leave empty
                 on first stack create (only the ECR repo will be provisioned);
                 populate once the image has been pushed, then re-deploy to
                 create the Lambda + EventBridge rule.

  DevIpCidr:
    Type: String
    Default: "0.0.0.0/0"
    Description: Dev / ops CIDR allowed to reach Aurora on 5432. Narrow to
                 your home IP /32 in production. Default keeps behaviour
                 backwards-compatible so Amplify SSR (no stable IP range)
                 can still connect.

  AmplifyCidr:
    Type: String
    Default: "0.0.0.0/0"
    Description: CIDR used by Amplify SSR to reach Aurora. Amplify Gen 1
                 doesn't publish a stable range; keep 0.0.0.0/0 until Amplify
                 moves into the VPC, then tighten.

Conditions:
  CreateAdminUser: !Not [!Equals [!Ref AdminEmail, ""]]
  HasClassifierImage: !Not [!Equals [!Ref ClassifierImageUri, ""]]

Resources:
  # --------------------------------------------------------------------
  # Secrets Manager — DB master password + cron secret
  # --------------------------------------------------------------------

  DBMasterSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ProjectName}/aurora/master"
      Description: Master password for the UNWI Aurora cluster.
      GenerateSecretString:
        SecretStringTemplate: '{"username": "unwiadmin"}'
        GenerateStringKey: password
        PasswordLength: 32
        # Exclusions beyond the SecretsManager defaults: characters that
        # confuse URL parsers (@, /), YAML (", \), dotenv comment chars (#),
        # and ampersands that break query-string-style connection strings.
        ExcludeCharacters: '"@/\#&'
      Tags:
        - { Key: Project, Value: !Ref ProjectName }

  CronSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ProjectName}/cron-secret"
      Description: Header value required on /api/cron/snapshot requests.
      GenerateSecretString:
        PasswordLength: 48
        ExcludePunctuation: true  # alphanumeric only — survives every
                                  # env-var / dotenv / shell-quoting path
                                  # we pass through (Amplify -> .env.production
                                  # -> Lambda env).
      Tags:
        - { Key: Project, Value: !Ref ProjectName }

  # --------------------------------------------------------------------
  # Networking — SG + subnet group
  # --------------------------------------------------------------------

  ClassifierLambdaSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: UNWI classifier Lambda - egress only
      VpcId: !Ref VpcId
      Tags:
        - { Key: Project, Value: !Ref ProjectName }
        - { Key: Name, Value: !Sub "${ProjectName}-classifier-lambda-sg" }

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: UNWI Aurora - Postgres ingress for Lambda + dev + Amplify
      VpcId: !Ref VpcId
      Tags:
        - { Key: Project, Value: !Ref ProjectName }
        - { Key: Name, Value: !Sub "${ProjectName}-aurora-sg" }

  DBSgIngressLambda:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DBSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref ClassifierLambdaSG
      Description: Postgres from classifier Lambda

  DBSgIngressDev:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DBSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      CidrIp: !Ref DevIpCidr
      Description: Postgres from dev / ops IP

  DBSgIngressAmplify:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DBSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      CidrIp: !Ref AmplifyCidr
      Description: Postgres from Amplify SSR (no stable IP range - tighten when Amplify moves into VPC)

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: UNWI Aurora subnet group
      SubnetIds: !Ref SubnetIds
      Tags:
        - { Key: Project, Value: !Ref ProjectName }

  # --------------------------------------------------------------------
  # Aurora Serverless v2 — Postgres
  # --------------------------------------------------------------------

  DBClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: UNWI Aurora cluster parameter group - force SSL
      Family: aurora-postgresql16
      Parameters:
        rds.force_ssl: "1"
      Tags:
        - { Key: Project, Value: !Ref ProjectName }

  DBCluster:
    Type: AWS::RDS::DBCluster
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: aurora-postgresql
      EngineVersion: "16.6"
      DatabaseName: unwi
      DBClusterIdentifier: !Sub "${ProjectName}-aurora"
      DBClusterParameterGroupName: !Ref DBClusterParameterGroup
      MasterUsername: !Sub "{{resolve:secretsmanager:${DBMasterSecret}:SecretString:username}}"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DBMasterSecret}:SecretString:password}}"
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt DBSecurityGroup.GroupId
      ServerlessV2ScalingConfiguration:
        MinCapacity: !Ref DBMinCapacity
        MaxCapacity: !Ref DBMaxCapacity
      BackupRetentionPeriod: 7
      StorageEncrypted: true
      EnableIAMDatabaseAuthentication: false
      EnableHttpEndpoint: false
      Tags:
        - { Key: Project, Value: !Ref ProjectName }

  DBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub "${ProjectName}-aurora-writer"
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref DBInstanceClass
      Engine: aurora-postgresql
      PubliclyAccessible: true
      Tags:
        - { Key: Project, Value: !Ref ProjectName }

  # --------------------------------------------------------------------
  # Cognito — user pool + hosted UI + app client
  # --------------------------------------------------------------------

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${ProjectName}-users"
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
      UserPoolTags:
        Project: !Ref ProjectName

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${ProjectName}-web"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      # OAuth2 "Authorization Code" flow for hosted-UI.
      AllowedOAuthFlows: [code]
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes: [openid, email, profile]
      SupportedIdentityProviders: [COGNITO]
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      # Both local and deploy hostnames — extend as subdomains come online.
      CallbackURLs:
        - http://localhost:3000/api/auth/callback
        - http://localhost:3003/api/auth/callback
        - https://unworkforceintelligence.org/api/auth/callback
        - https://www.unworkforceintelligence.org/api/auth/callback
      LogoutURLs:
        - http://localhost:3000/login
        - http://localhost:3003/login
        - https://unworkforceintelligence.org/login
        - https://www.unworkforceintelligence.org/login
      AccessTokenValidity: 8
      IdTokenValidity: 8
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      PreventUserExistenceErrors: ENABLED

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref UserPool

  AdminUser:
    Type: AWS::Cognito::UserPoolUser
    Condition: CreateAdminUser
    Properties:
      UserPoolId: !Ref UserPool
      Username: !Ref AdminEmail
      DesiredDeliveryMediums: [EMAIL]
      UserAttributes:
        - { Name: email, Value: !Ref AdminEmail }
        - { Name: email_verified, Value: "true" }

  # --------------------------------------------------------------------
  # Classifier service — S3 + ECR + Lambda + nightly EventBridge
  # --------------------------------------------------------------------

  SnapshotsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-snapshots-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - { Key: Project, Value: !Ref ProjectName }

  ClassifierRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${ProjectName}-classifier"
      ImageScanningConfiguration:
        ScanOnPush: true
      Tags:
        - { Key: Project, Value: !Ref ProjectName }

  ClassifierLambdaRole:
    Type: AWS::IAM::Role
    Condition: HasClassifierImage
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: s3-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:PutObject, s3:PutObjectAcl]
                Resource: !Sub "${SnapshotsBucket.Arn}/*"
              - Effect: Allow
                Action: [s3:ListBucket]
                Resource: !GetAtt SnapshotsBucket.Arn
        - PolicyName: read-db-secret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref DBMasterSecret
      Tags:
        - { Key: Project, Value: !Ref ProjectName }

  ClassifierLambda:
    Type: AWS::Lambda::Function
    Condition: HasClassifierImage
    Properties:
      FunctionName: !Sub "${ProjectName}-classifier"
      PackageType: Image
      Code:
        ImageUri: !Ref ClassifierImageUri
      Role: !GetAtt ClassifierLambdaRole.Arn
      MemorySize: 2048
      Timeout: 600
      VpcConfig:
        SecurityGroupIds: [!Ref ClassifierLambdaSG]
        SubnetIds: !Ref SubnetIds
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DBMasterSecret
          AURORA_HOST: !GetAtt DBCluster.Endpoint.Address
          AURORA_DB: unwi
          S3_BUCKET: !Ref SnapshotsBucket
          S3_PREFIX: snapshots
      Tags:
        - { Key: Project, Value: !Ref ProjectName }

  ClassifierNightly:
    Type: AWS::Events::Rule
    Condition: HasClassifierImage
    Properties:
      Name: !Sub "${ProjectName}-classifier-nightly"
      Description: UNWI classifier — nightly 02:00 UTC
      ScheduleExpression: cron(0 2 * * ? *)
      State: ENABLED
      Targets:
        - Id: classifier-lambda
          Arn: !GetAtt ClassifierLambda.Arn

  ClassifierNightlyPermission:
    Type: AWS::Lambda::Permission
    Condition: HasClassifierImage
    Properties:
      FunctionName: !GetAtt ClassifierLambda.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ClassifierNightly.Arn

Outputs:
  # Consumed by Amplify env-vars. Copy these values into the console after
  # `infra/deploy.sh` reports "stack ready".

  CognitoUserPoolId:
    Description: COGNITO_USER_POOL_ID
    Value: !Ref UserPool
    Export: { Name: !Sub "${ProjectName}:CognitoUserPoolId" }

  CognitoClientId:
    Description: COGNITO_CLIENT_ID
    Value: !Ref UserPoolClient
    Export: { Name: !Sub "${ProjectName}:CognitoClientId" }

  CognitoDomain:
    Description: COGNITO_DOMAIN (bare hostname, no scheme)
    Value: !Sub "${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com"
    Export: { Name: !Sub "${ProjectName}:CognitoDomain" }

  CognitoRegion:
    Description: COGNITO_REGION
    Value: !Ref AWS::Region
    Export: { Name: !Sub "${ProjectName}:CognitoRegion" }

  DBClusterEndpoint:
    Description: Aurora writer endpoint (host portion of DATABASE_URL)
    Value: !GetAtt DBCluster.Endpoint.Address

  DBClusterPort:
    Description: Aurora port (5432)
    Value: !GetAtt DBCluster.Endpoint.Port

  DBName:
    Description: Aurora database name
    Value: unwi

  DBMasterSecretArn:
    Description: Secret ARN holding the DB username + password (JSON)
    Value: !Ref DBMasterSecret

  CronSecretArn:
    Description: Secret ARN holding the /api/cron/* x-cron-secret value
    Value: !Ref CronSecret

  DBSecurityGroupId:
    Description: Security group ID — extend ingress rules here if you tighten CIDRs
    Value: !GetAtt DBSecurityGroup.GroupId

  SnapshotsBucketName:
    Description: S3 bucket holding classifier artefacts
    Value: !Ref SnapshotsBucket

  ClassifierRepoUri:
    Description: ECR repo URI — push the classifier image here
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ClassifierRepo}"

  ClassifierLambdaSgId:
    Description: Security group attached to the classifier Lambda
    Value: !GetAtt ClassifierLambdaSG.GroupId

  ClassifierLambdaName:
    Description: Lambda function name (only populated once ClassifierImageUri is set)
    Value: !If [HasClassifierImage, !Ref ClassifierLambda, "not-yet-deployed"]

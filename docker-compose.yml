# Local Postgres for dev. Matches DATABASE_URL in .env.example.
# `docker compose up -d` then `npm run db:push` to apply the schema.

services:
  postgres:
    # postgres:16 (Debian) rather than alpine because the alpine image wasn't
    # reachable from a common TLS-proxy environment and the standard image is
    # already cached on most dev machines.
    image: postgres:16
    container_name: unwi-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unwi
    # Host-side 5433 avoids clashing with another local postgres on 5432.
    ports:
      - "5433:5432"
    volumes:
      - unwi-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  unwi-pgdata:

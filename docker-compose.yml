# Local Postgres for dev. Matches DATABASE_URL in .env.example.
# `docker compose up -d` then `npm run db:push` to apply the schema.

services:
  postgres:
    image: postgres:16-alpine
    container_name: unwi-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unwi
    ports:
      - "5432:5432"
    volumes:
      - unwi-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  unwi-pgdata:
